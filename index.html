<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wykres Giełdowy 3D + Scroll</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0f19;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="info">
        <h2>Wykres Giełdowy 3D</h2>
        <p>Użyj scrolla myszy (scroll down / up), aby poruszać się po wykresie.</p>
    </div>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0b0f19, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0x00ff88, 1);
        dirLight.position.set(0, 10, 10);
        scene.add(dirLight);

        const points = [];
        let currentPrice = 10;
        const totalPoints = 60;
        const spacingX = 2;

        for (let i = 0; i < totalPoints; i++) {
            currentPrice += (Math.random() - 0.45) * 4; 
            if (currentPrice < 2) currentPrice = 2;
            
            points.push(new THREE.Vector3(i * spacingX, currentPrice, 0));
        }

        const curve = new THREE.CatmullRomCurve3(points);
        const geometry = new THREE.TubeGeometry(curve, 200, 0.15, 8, false);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88, 
            emissive: 0x003311,
            roughness: 0.2,
            metalness: 0.8
        });
        const graphLine = new THREE.Mesh(geometry, material);
        scene.add(graphLine);

        const gridHelper = new THREE.GridHelper(200, 50, 0x444445, 0x222225);
        gridHelper.position.set(50, 0, 0);
        scene.add(gridHelper);

        let targetCameraX = 0;
        camera.position.set(0, 12, 15);
        camera.lookAt(0, 10, 0);

        window.addEventListener('wheel', (event) => {
            targetCameraX += event.deltaY * 0.02;

            const maxExtent = (totalPoints - 5) * spacingX;
            if (targetCameraX < 0) targetCameraX = 0;
            if (targetCameraX > maxExtent) targetCameraX = maxExtent;
        });

        function animate() {
            requestAnimationFrame(animate);

            camera.position.x += (targetCameraX - camera.position.x) * 0.05;
            
            camera.lookAt(camera.position.x + 5, 8, 0);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
