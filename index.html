<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Site</title>
  <style>
    :root {
      --bg: #f6f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #0ea5e9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #e0f2fe 0%, var(--bg) 60%);
    }

    .card {
      background: var(--card);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      text-align: center;
      max-width: 520px;
      width: calc(100% - 2rem);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 2rem;
    }

    p {
      margin: 0 0 1rem;
      line-height: 1.5;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Welcome</h1>
    <p>This is your simple HTML site.</p>
    <a href="https://example.com" target="_blank" rel="noreferrer">Learn more</a>
  </main>
</body>
</html>
